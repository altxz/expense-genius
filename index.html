    <!-- Inline critical loading styles to avoid FOUC -->
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #fafafa;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root:empty::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 3px solid #e5e7eb;
        border-top-color: #5447BC;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        #root:empty { background: #0a0a0a; }
        #root:empty::after { border-color: #333; border-top-color: #7c6df0; }
      }
